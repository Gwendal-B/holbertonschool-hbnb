<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    place.html
    Page de détail d'un logement.
    Affiche les informations complètes d'une place, sa galerie photo,
    ses reviews et la modale d'édition/suppression d'une review.
  -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HBnB — Place Details</title>
  <link rel="icon" href="images/favicon.png" type="image/png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="bg-slideshow">
    <div class="bg-slide active" style="background-image: url('images/backgrounds/bg1.jpg');"></div>
    <div class="bg-slide" style="background-image: url('images/backgrounds/bg2.jpg');"></div>
    <div class="bg-slide" style="background-image: url('images/backgrounds/bg3.jpg');"></div>
    <div class="bg-slide" style="background-image: url('images/backgrounds/bg4.jpg');"></div>
    <div class="bg-slide" style="background-image: url('images/backgrounds/bg5.jpg');"></div>
    <div class="bg-slide" style="background-image: url('images/backgrounds/bg6.jpg');"></div>
  </div>
  <div class="bg-overlay"></div>

  <header>
    <a href="index.html" class="logo-wrap" aria-label="HBnB Home">
      <svg class="logo-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
        <circle cx="20" cy="20" r="20" fill="#2d4230"/>
        <path d="M8 22 L20 10 L32 22" stroke="#c8d5c0" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <rect x="12" y="22" width="16" height="11" rx="1.5" fill="none" stroke="#c8d5c0" stroke-width="2"/>
        <rect x="17" y="27" width="6" height="6" rx="1" fill="#c4714a"/>
        <path d="M20 10 C20 10 24 6 27 8 C25 11 21 12 20 10Z" fill="#7a9970"/>
      </svg>
      <span class="logo-text">HB<span>nB</span></span>
    </a>

    <nav>
      <a href="index.html">Explore</a>
      <a href="login.html" class="login-button" id="login-link">Sign in</a>
    </nav>
  </header>

  <main>
    <div id="place-details">
      <div class="loading-state">
        <div class="loading-spinner"></div>
        <p>Loading place details…</p>
      </div>
    </div>

  </main>

  <footer>
    <p>&copy; 2024 HBnB. All rights reserved.</p>
  </footer>

  <div id="place-modal" class="place-modal hidden">
    <div class="place-modal-overlay"></div>

    <div class="place-modal-content">
      <button id="place-modal-close" class="place-modal-close" aria-label="Close">
        &times;
      </button>

      <h3 class="place-modal-title">Edit place</h3>

      <div class="place-modal-group">
        <label for="place-modal-title" class="place-modal-label">Title</label>
        <input id="place-modal-title" class="place-modal-input" type="text" placeholder="Title" />
      </div>

      <div class="place-modal-group">
        <label for="place-modal-description" class="place-modal-label">Description</label>
        <textarea id="place-modal-description" class="place-modal-textarea" placeholder="Description"></textarea>
      </div>

      <div class="place-modal-group">
        <label for="place-modal-price" class="place-modal-label">Price / night</label>
        <input id="place-modal-price" class="place-modal-input" type="number" step="0.01" placeholder="Price" />
      </div>

      <div class="place-modal-group">
        <label for="place-modal-city" class="place-modal-label">City</label>
        <input id="place-modal-city" class="place-modal-input" type="text" placeholder="City" />
      </div>

      <div class="place-modal-group">
        <label for="place-modal-country" class="place-modal-label">Country</label>
        <input id="place-modal-country" class="place-modal-input" type="text" placeholder="Country" />
      </div>

      <div class="place-modal-group">
        <label for="place-modal-guests" class="place-modal-label">Max guests</label>
        <input id="place-modal-guests" class="place-modal-input" type="number" min="1" placeholder="Max guests" />
      </div>

      <div class="place-modal-actions">
        <button id="place-modal-save" class="place-modal-save">Save</button>
        <button id="place-modal-delete" class="place-modal-delete">Delete</button>
      </div>
    </div>
  </div>



  <div id="lightbox" class="lightbox hidden">
    <button id="lightbox-prev" class="lightbox-nav lightbox-prev" aria-label="Previous image">❮</button>
    <img id="lightbox-image" class="lightbox-image" src="" alt="Expanded photo" />
    <button id="lightbox-next" class="lightbox-nav lightbox-next" aria-label="Next image">❯</button>
    <span id="lightbox-close" class="lightbox-close">&times;</span>
  </div>

  <div id="review-modal" class="review-modal hidden">
    <div class="review-modal-overlay"></div>

    <div class="review-modal-content">
      <button id="review-modal-close" class="review-modal-close" aria-label="Close">
        &times;
      </button>

      <h3 class="review-modal-title">Edit review</h3>

      <textarea id="review-modal-text" class="review-modal-text"></textarea>

      <select id="review-modal-rating" class="review-modal-rating">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
      </select>

      <div class="review-modal-actions">
        <button id="review-modal-save" class="review-modal-save">Save</button>
        <button id="review-modal-delete" class="review-modal-delete">Delete</button>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const slides = document.querySelectorAll('.bg-slide');
      if (!slides.length) return;

      let current = 0;
      const intervalTime = 8000; // changer ici la vitesse

      function showSlide(nextIndex) {
        slides[current].classList.remove('active');
        current = nextIndex;
        slides[current].classList.add('active');
      }

      setInterval(() => {
        const next = (current + 1) % slides.length;
        showSlide(next);
      }, intervalTime);
    })();
  </script>

  <script src="scripts/api.js"></script>
  <script src="scripts/places-images.js"></script>
  <script src="scripts/place.js"></script>
</body>
</html>
