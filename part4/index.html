<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>List of Places</title>
  <link rel="icon" href="images/icon.png" type="image/png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ── Header ── -->
  <header>
    <a href="index.html" aria-label="HBnB Home">
      <span class="logo-text">HBnB</span>
    </a>
    <nav>
      <a href="index.html">Places</a>
      <a href="login.html" class="login-button" id="login-link">Login</a>
    </nav>
  </header>

  <!-- ── Main ── -->
  <main>
    <h1 class="page-title">Places to stay</h1>
    <p class="page-subtitle">Discover unique homes around the world</p>

    <!-- Filter Bar — options fixes selon spec T2 -->
    <div class="filter-bar">
      <label for="price-filter">Max price per night:</label>
      <select id="price-filter">
        <option value="All">All</option>
        <option value="10">$10</option>
        <option value="50">$50</option>
        <option value="100">$100</option>
      </select>
    </div>

    <!-- Places Grid — peuplé dynamiquement par index.js -->
    <div id="places-list"></div>
  </main>

  <!-- ── Footer ── -->
  <footer>
    <p>&copy; 2024 HBnB. All rights reserved.</p>
  </footer>

  <script src="scripts/api.js"></script>
  <script src="scripts/index.js"></script>
</body>
</html>
